<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share — Spark Sharing</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --spark: #FF6B2B;
            --spark-light: #FF8F5E;
            --spark-glow: #FFAD3B;
            --dark: #0A0A0F;
            --dark-surface: #12121A;
            --dark-card: #1A1A25;
            --gray-text: #8A8A9A;
            --light-text: #E0E0E8;
            --white: #FAFAFF;
            --green: #34D399;
            --linkedin: #0A66C2;
            --x-color: #E7E9EA;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--light-text);
            min-height: 100vh;
        }
        h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .page { position: relative; z-index: 2; }

        /* NAV */
        .topbar {
            padding: 16px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: var(--dark-surface);
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 18px;
            color: var(--white);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .logo-spark {
            width: 22px; height: 22px;
            background: linear-gradient(135deg, var(--spark), var(--spark-glow));
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* HEADER */
        .share-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .share-header .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(255,107,43,0.1);
            border: 1px solid rgba(255,107,43,0.2);
            border-radius: 100px;
            font-size: 13px;
            color: var(--spark-light);
            margin-bottom: 16px;
        }
        .share-header h1 {
            font-size: 32px;
            color: var(--white);
            margin-bottom: 8px;
        }
        .share-header p {
            color: var(--gray-text);
            font-size: 16px;
        }
        .share-header .greeting {
            color: var(--spark-light);
            font-weight: 600;
        }

        /* STEPS */
        .share-step {
            margin-bottom: 32px;
        }
        .step-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .step-num {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--spark), var(--spark-glow));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: white;
        }
        .step-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--white);
        }

        /* IMAGE SELECTION */
        .image-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .image-option {
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
        }
        .image-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-option:hover {
            border-color: rgba(255,107,43,0.4);
            transform: scale(1.02);
        }
        .image-option.selected {
            border-color: var(--spark);
            box-shadow: 0 0 20px rgba(255,107,43,0.3);
        }
        .image-option.selected::after {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            background: var(--spark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }
        .no-images {
            padding: 32px;
            text-align: center;
            color: var(--gray-text);
            background: var(--dark-card);
            border-radius: 12px;
        }

        /* COPY SELECTION */
        .copy-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .copy-option {
            background: var(--dark-card);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .copy-option:hover {
            border-color: rgba(255,107,43,0.3);
        }
        .copy-option.selected {
            border-color: var(--spark);
            background: rgba(255,107,43,0.05);
        }
        .copy-option p {
            font-size: 15px;
            line-height: 1.5;
            color: var(--light-text);
            white-space: pre-wrap;
        }
        .copy-option .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 10px;
            padding: 6px 14px;
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 6px;
            color: var(--gray-text);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .copy-option .copy-btn:hover {
            background: rgba(255,107,43,0.15);
            color: var(--spark-light);
        }

        /* SHARE BUTTONS */
        .share-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .share-btn {
            flex: 1;
            min-width: 200px;
            padding: 16px 24px;
            border-radius: 12px;
            border: none;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }
        .share-btn:hover {
            transform: translateY(-2px);
        }
        .share-btn-linkedin {
            background: var(--linkedin);
            color: white;
        }
        .share-btn-linkedin:hover {
            box-shadow: 0 8px 24px rgba(10,102,194,0.4);
        }
        .share-btn-x {
            background: var(--dark-card);
            color: var(--x-color);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .share-btn-x:hover {
            background: #1A1A25;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .share-btn svg {
            width: 20px;
            height: 20px;
        }

        /* DOWNLOAD BUTTON */
        .download-section {
            margin-top: 16px;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--light-text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .download-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--white);
        }

        /* SUCCESS */
        .share-success {
            text-align: center;
            padding: 40px;
            background: var(--dark-card);
            border-radius: 16px;
            border: 1px solid rgba(52,211,153,0.2);
            display: none;
        }
        .share-success .icon { font-size: 48px; margin-bottom: 12px; }
        .share-success h3 { color: var(--green); font-size: 22px; margin-bottom: 8px; }
        .share-success p { color: var(--gray-text); }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--green);
            color: var(--dark);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.3s;
            z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--gray-text);
        }
        .error {
            text-align: center;
            padding: 80px 20px;
        }
        .error h2 { color: var(--white); margin-bottom: 8px; }
        .error p { color: var(--gray-text); margin-bottom: 24px; }
        .error a {
            color: var(--spark-light);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .container { padding: 24px 16px 60px; }
            .share-header h1 { font-size: 24px; }
            .image-options { grid-template-columns: 1fr 1fr; }
            .share-buttons { flex-direction: column; }
            .share-btn { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <a href="/" class="logo">
                <div class="logo-spark">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" style="width:13px;height:13px">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </div>
                Spark Sharing
            </a>
        </div>

        <div class="container" id="main">
            <div class="loading" id="loading">
                <p>Loading your share kit...</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script>
        const token = window.location.pathname.split('/s/')[1];
        let shareData = null;
        let selectedImage = null;
        let selectedCopy = null;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function esc(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        async function loadShareData() {
            try {
                const res = await fetch(`/api/share/${token}`);
                if (!res.ok) throw new Error('not found');
                shareData = await res.json();
                render();
            } catch (err) {
                document.getElementById('main').innerHTML = `
                    <div class="error">
                        <h2>Link not found</h2>
                        <p>This share link may have expired or doesn't exist.</p>
                        <a href="/">← Back to Spark Sharing</a>
                    </div>`;
            }
        }

        function render() {
            const { campaign, images, recipient } = shareData;
            const greeting = recipient.name ? `Hey ${esc(recipient.name)}!` : 'Hey there!';

            document.getElementById('main').innerHTML = `
                <div class="share-header">
                    <div class="badge">⚡ ${esc(campaign.name)}</div>
                    <h1><span class="greeting">${greeting}</span> Ready to share?</h1>
                    <p>Pick an image and grab the copy below. It takes 10 seconds.</p>
                </div>

                ${images.length ? `
                <div class="share-step">
                    <div class="step-label">
                        <div class="step-num">1</div>
                        <div class="step-title">Pick an image</div>
                    </div>
                    <div class="image-options">
                        ${images.map((img, i) => `
                            <div class="image-option${i === 0 ? ' selected' : ''}" onclick="selectImage(${i}, this)" data-url="${esc(img.image_url)}">
                                <img src="${esc(img.image_url)}" alt="${esc(img.alt_text || 'Campaign image')}">
                            </div>
                        `).join('')}
                    </div>
                    <div class="download-section" id="download-section">
                        <a class="download-btn" id="download-btn" href="${images[0] ? images[0].image_url : '#'}" download target="_blank">
                            ⬇ Download selected image
                        </a>
                    </div>
                </div>` : ''}

                ${(campaign.social_copies || []).length ? `
                <div class="share-step">
                    <div class="step-label">
                        <div class="step-num">${images.length ? '2' : '1'}</div>
                        <div class="step-title">Pick your copy</div>
                    </div>
                    <div class="copy-options">
                        ${(campaign.social_copies || []).map((copy, i) => `
                            <div class="copy-option${i === 0 ? ' selected' : ''}" onclick="selectCopy(${i}, this)">
                                <p>${esc(copy)}</p>
                                <button class="copy-btn" onclick="event.stopPropagation();copyText(${i})">📋 Copy text</button>
                            </div>
                        `).join('')}
                    </div>
                </div>` : ''}

                <div class="share-step">
                    <div class="step-label">
                        <div class="step-num">${images.length && (campaign.social_copies || []).length ? '3' : images.length || (campaign.social_copies || []).length ? '2' : '1'}</div>
                        <div class="step-title">Share it</div>
                    </div>
                    <div class="share-buttons">
                        <a class="share-btn share-btn-linkedin" onclick="shareToLinkedIn()">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                            Share on LinkedIn
                        </a>
                        <a class="share-btn share-btn-x" onclick="shareToX()">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                            Share on X
                        </a>
                    </div>
                </div>

                <div class="share-success" id="success-msg">
                    <div class="icon">🎉</div>
                    <h3>Thanks for sharing!</h3>
                    <p>Your post helps amplify the message to your network.</p>
                </div>
            `;

            // Set defaults
            if (images.length) selectedImage = images[0].image_url;
            if ((campaign.social_copies || []).length) selectedCopy = campaign.social_copies[0];
        }

        function selectImage(idx, el) {
            document.querySelectorAll('.image-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedImage = shareData.images[idx].image_url;
            const dlBtn = document.getElementById('download-btn');
            if (dlBtn) dlBtn.href = selectedImage;
        }

        function selectCopy(idx, el) {
            document.querySelectorAll('.copy-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedCopy = shareData.campaign.social_copies[idx];
        }

        function copyText(idx) {
            const text = shareData.campaign.social_copies[idx];
            navigator.clipboard.writeText(text);
            showToast('Text copied to clipboard!');
        }

        function shareToLinkedIn() {
            const text = selectedCopy || '';
            // LinkedIn feed with share dialog - no URL to avoid auto-preview
            const url = 'https://www.linkedin.com/feed/?shareActive=true';
            // Copy the text first so user can paste it
            if (text) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Text copied! Paste it in your LinkedIn post.');
                });
            }
            window.open(url, '_blank', 'width=600,height=600');
            trackShare('linkedin');
        }

        function shareToX() {
            const text = selectedCopy || '';
            const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank', 'width=600,height=400');
            trackShare('x');
        }

        async function trackShare(platform) {
            try {
                await fetch('/api/share-events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token,
                        platform,
                        image_url: selectedImage
                    })
                });
            } catch (e) { /* silent */ }

            const el = document.getElementById('success-msg');
            if (el) {
                el.style.display = 'block';
                el.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Init
        if (token) {
            loadShareData();
        } else {
            document.getElementById('main').innerHTML = `
                <div class="error">
                    <h2>Invalid link</h2>
                    <p>This doesn't look like a valid share link.</p>
                    <a href="/">← Back to Spark Sharing</a>
                </div>`;
        }
    </script>
</body>
</html>
