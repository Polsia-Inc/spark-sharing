<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — Spark Sharing</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --spark: #FF6B2B;
            --spark-light: #FF8F5E;
            --spark-glow: #FFAD3B;
            --dark: #0A0A0F;
            --dark-surface: #12121A;
            --dark-card: #1A1A25;
            --gray-text: #8A8A9A;
            --light-text: #E0E0E8;
            --white: #FAFAFF;
            --green: #34D399;
            --blue: #60A5FA;
            --purple: #A78BFA;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--light-text);
            min-height: 100vh;
        }
        h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .app { position: relative; z-index: 2; }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: var(--dark-surface);
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-spark {
            width: 24px; height: 24px;
            background: linear-gradient(135deg, var(--spark), var(--spark-glow));
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
        }
        .topbar-actions { display: flex; gap: 12px; align-items: center; }
        .btn-ghost {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--gray-text);
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            text-decoration: none;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: var(--white); }

        .container { max-width: 1100px; margin: 0 auto; padding: 32px; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .page-header h1 { font-size: 28px; color: var(--white); }

        .period-tabs {
            display: flex;
            gap: 4px;
            background: var(--dark-surface);
            border-radius: 10px;
            padding: 4px;
        }
        .period-tab {
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--gray-text);
            border: none;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }
        .period-tab.active {
            background: var(--dark-card);
            color: var(--white);
        }
        .period-tab:hover:not(.active) { color: var(--light-text); }

        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--dark-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 24px;
            transition: all 0.2s;
        }
        .stat-card:hover {
            border-color: rgba(255,255,255,0.1);
        }
        .stat-card .label {
            font-size: 12px;
            color: var(--gray-text);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--white);
            line-height: 1;
        }
        .stat-card .value.spark { color: var(--spark); }
        .stat-card .value.green { color: var(--green); }
        .stat-card .value.blue { color: var(--blue); }
        .stat-card .value.purple { color: var(--purple); }

        /* SECTIONS */
        .section {
            background: var(--dark-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 28px;
            margin-bottom: 20px;
        }
        .section h3 {
            font-size: 18px;
            color: var(--white);
            margin-bottom: 20px;
        }

        /* TABLE */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--gray-text);
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .data-table td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .data-table tr:last-child td { border-bottom: none; }

        /* BAR */
        .bar-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bar-track {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }
        .bar-fill.spark { background: linear-gradient(90deg, var(--spark), var(--spark-glow)); }
        .bar-fill.blue { background: linear-gradient(90deg, #3B82F6, var(--blue)); }
        .bar-fill.green { background: linear-gradient(90deg, #10B981, var(--green)); }
        .bar-fill.purple { background: linear-gradient(90deg, #7C3AED, var(--purple)); }

        .bar-value {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: var(--white);
            min-width: 48px;
            text-align: right;
        }

        .empty-text {
            color: var(--gray-text);
            font-size: 14px;
            text-align: center;
            padding: 24px;
        }

        /* LEADS TABLE */
        .leads-section { margin-top: 20px; }

        .loading { color: var(--gray-text); text-align: center; padding: 60px; }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .page-header { flex-direction: column; gap: 16px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <a href="/" class="logo">
                <div class="logo-spark">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" style="width:14px;height:14px">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </div>
                Spark Sharing
            </a>
            <div class="topbar-actions">
                <a href="/admin" class="btn-ghost">Campaigns</a>
                <a href="/" class="btn-ghost">Site</a>
            </div>
        </div>

        <div class="container">
            <div class="page-header">
                <h1>Analytics</h1>
                <div class="period-tabs">
                    <button class="period-tab" onclick="loadData(1, this)">24h</button>
                    <button class="period-tab active" onclick="loadData(7, this)">7d</button>
                    <button class="period-tab" onclick="loadData(30, this)">30d</button>
                    <button class="period-tab" onclick="loadData(90, this)">90d</button>
                </div>
            </div>

            <div id="content">
                <div class="loading">Loading analytics...</div>
            </div>
        </div>
    </div>

    <script>
        let currentDays = 7;

        async function loadData(days, btn) {
            currentDays = days;
            if (btn) {
                document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
            }

            try {
                const [metricsRes, leadsRes] = await Promise.all([
                    fetch(`/api/metrics?days=${days}`),
                    fetch(`/api/leads/stats`)
                ]);

                const metrics = await metricsRes.json();
                const leads = leadsRes.ok ? await leadsRes.json() : { total: 0, recent: [] };

                render(metrics, leads);
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="loading" style="color:#F87171">Failed to load analytics: ${err.message}</div>`;
            }
        }

        function render(metrics, leads) {
            const o = metrics.overview;
            const maxPageViews = Math.max(...(metrics.top_pages || []).map(p => parseInt(p.views)), 1);
            const maxEvents = Math.max(...(metrics.events || []).map(e => parseInt(e.count)), 1);

            const eventColors = {
                'page_view': 'spark',
                'share_link_open': 'blue',
                'share_click_linkedin': 'blue',
                'share_click_x': 'purple',
                'lead_captured': 'green',
                'campaign_created': 'spark',
                'copy_text_clicked': 'purple',
                'download_image': 'green'
            };

            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">Page Views</div>
                        <div class="value">${o.page_views.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Unique Visitors</div>
                        <div class="value blue">${o.unique_visitors.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Leads Captured</div>
                        <div class="value green">${o.leads_captured.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Campaigns Created</div>
                        <div class="value spark">${o.campaigns_created.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Share Link Opens</div>
                        <div class="value purple">${o.share_link_opens.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Share Clicks</div>
                        <div class="value spark">${o.share_clicks.toLocaleString()}</div>
                    </div>
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                    <div class="section">
                        <h3>Top Pages</h3>
                        ${(metrics.top_pages || []).length ? `
                            <table class="data-table">
                                <thead>
                                    <tr><th>Page</th><th>Views</th></tr>
                                </thead>
                                <tbody>
                                    ${metrics.top_pages.map(p => `
                                        <tr>
                                            <td style="color:var(--white);font-family:'Space Grotesk',monospace;font-size:13px">${esc(p.path)}</td>
                                            <td>
                                                <div class="bar-wrapper">
                                                    <div class="bar-track">
                                                        <div class="bar-fill spark" style="width:${(parseInt(p.views) / maxPageViews * 100)}%"></div>
                                                    </div>
                                                    <div class="bar-value">${parseInt(p.views).toLocaleString()}</div>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        ` : '<p class="empty-text">No page views yet</p>'}
                    </div>

                    <div class="section">
                        <h3>Events</h3>
                        ${(metrics.events || []).length ? `
                            <table class="data-table">
                                <thead>
                                    <tr><th>Event</th><th>Count</th></tr>
                                </thead>
                                <tbody>
                                    ${metrics.events.map(e => `
                                        <tr>
                                            <td style="color:var(--white)">${formatEventName(e.event_type)}</td>
                                            <td>
                                                <div class="bar-wrapper">
                                                    <div class="bar-track">
                                                        <div class="bar-fill ${eventColors[e.event_type] || 'spark'}" style="width:${(parseInt(e.count) / maxEvents * 100)}%"></div>
                                                    </div>
                                                    <div class="bar-value">${parseInt(e.count).toLocaleString()}</div>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        ` : '<p class="empty-text">No events tracked yet</p>'}
                    </div>
                </div>

                <div class="section leads-section">
                    <h3>Email Leads <span style="color:var(--gray-text);font-size:14px;font-weight:400">(${leads.total || 0} total)</span></h3>
                    ${(leads.recent || []).length ? `
                        <table class="data-table">
                            <thead>
                                <tr><th>Email</th><th>Source</th><th>Signed Up</th></tr>
                            </thead>
                            <tbody>
                                ${leads.recent.map(l => `
                                    <tr>
                                        <td style="color:var(--white)">${esc(l.email)}</td>
                                        <td><span style="padding:4px 10px;background:rgba(255,107,43,0.1);border-radius:6px;font-size:12px;color:var(--spark-light)">${esc(l.source)}</span></td>
                                        <td style="color:var(--gray-text);font-size:13px">${formatDate(l.created_at)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    ` : '<p class="empty-text">No leads captured yet</p>'}
                </div>
            `;
        }

        function formatEventName(name) {
            return name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            const now = new Date();
            const diffMs = now - d;
            const diffMins = Math.floor(diffMs / 60000);
            if (diffMins < 60) return `${diffMins}m ago`;
            const diffHrs = Math.floor(diffMins / 60);
            if (diffHrs < 24) return `${diffHrs}h ago`;
            const diffDays = Math.floor(diffHrs / 24);
            if (diffDays < 7) return `${diffDays}d ago`;
            return d.toLocaleDateString();
        }

        function esc(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // Load on init
        loadData(7);
    </script>
</body>
</html>
